<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        {{ userInfo()?.firstName?.charAt(0) }}{{ userInfo()?.lastName?.charAt(0) }}
      </div>

      <div class="user-main-info">
        <h2>{{ userInfo()?.firstName }} {{ userInfo()?.lastName }}</h2>
        <span>{{ userInfo()?.role }}</span>
      </div>
    </div>

    <div class="profile-info">
      <div class="info-item">
        <span>Email Address</span>
        <p>{{ userInfo()?.email }}</p>
      </div>

      <div class="info-item">
        <span>Phone Number</span>
        <p>{{ userInfo()?.phoneNumber }}</p>
      </div>

      <div class="info-item">
        <span>Account Role</span>
        <p>{{ userInfo()?.role }}</p>
      </div>
    </div>

    <div class="nav-div">
    <button
  [routerLink]="['/profile', authService.userPhoneNumber(), 'rent-cars']"
  routerLinkActive="active-link">
  <i class="fa-solid fa-circle-chevron-down"></i> Renting Cars
</button>

<button
  [routerLink]="['/profile', authService.userPhoneNumber(), 'my-cars']"
  routerLinkActive="active-link">
  <i class="fa-solid fa-circle-chevron-down"></i> My Bookings
</button>

<button
  [routerLink]="['/profile', authService.userPhoneNumber(), 'my-favorites']"
  routerLinkActive="active-link">
   <i class="fa-solid fa-circle-chevron-down"></i> My Favorites
</button>
    </div>

    <div class="profile-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
